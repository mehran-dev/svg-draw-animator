<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>JS Time Machine (Fixed)</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      button {
        padding: 10px 20px;
        cursor: pointer;
        font-size: 16px;
      }

      #area {
        width: 80%;
        height: 400px;
        border: 2px dashed #999;
        position: relative;
        overflow: hidden;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: red;
        position: absolute;
      }

      #ghost {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: blue;
        position: fixed;
        z-index: 9999;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <h2>JS Time Machine (Fixed Version)</h2>

    <div>
      <button onclick="startRecording()">Start Recording</button>
      <button onclick="replay()">Replay</button>
      <button onclick="clearArea()">Clear</button>
    </div>

    <div id="area"></div>

    <div id="ghost"></div>

    <script>
      let events = [];
      let startTime = null;

      const area = document.getElementById("area");
      const ghost = document.getElementById("ghost");

      // -------------------
      // RECORD
      // -------------------
      function startRecording() {
        events = [];
        startTime = Date.now();
        area.innerHTML = "";
        alert("Recording started!");
      }

      // -------------------
      // CLICK RECORDING
      // -------------------
      area.addEventListener("click", (e) => {
        if (!startTime) return;

        const x = e.offsetX;
        const y = e.offsetY;

        const time = Date.now() - startTime;

        events.push({ x, y, time });

        drawDot(x, y);
      });

      // -------------------
      // DRAW DOT
      // -------------------
      function drawDot(x, y) {
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.style.left = x + "px";
        dot.style.top = y + "px";
        area.appendChild(dot);
      }

      // -------------------
      // REPLAY
      // -------------------
      function replay() {
        if (events.length === 0) return;

        area.innerHTML = "";

        const start = events[0].time;

        events.forEach((ev) => {
          setTimeout(() => {
            drawDot(ev.x, ev.y);

            ghost.style.left = ev.x + "px";
            ghost.style.top = ev.y + "px";
          }, ev.time - start);
        });
      }

      // -------------------
      // CLEAR
      // -------------------
      function clearArea() {
        area.innerHTML = "";
        events = [];
      }
    </script>
  </body>
</html>
